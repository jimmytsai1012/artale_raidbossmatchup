<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Artale 組隊系統 - SUMMER公會</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #3498db;
            --success-color: #2ecc71;
            --border-color: #333;
        }
        body { 
            font-family: "Microsoft JhengHei", sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            font-size: 18px;
        }
        .container { 
            width: 100%;
            max-width: 850px; 
            background: var(--card-bg); 
            padding: 40px; 
            border-radius: 16px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.6); 
            text-align: center;
        }
        h1 { color: var(--accent-color); font-size: 2.8em; margin-bottom: 20px; letter-spacing: 2px; }
        
        /* 頂部設定區塊 */
        .setup-section { 
            display: flex; 
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px; 
            margin-bottom: 40px; 
            padding: 25px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }
        .setup-item { width: 220px; }
        .setup-item.wide { width: 300px; }

        label { font-weight: bold; margin-bottom: 12px; display: block; color: var(--accent-color); }
        select, input { 
            padding: 12px; 
            border-radius: 8px; 
            border: 1px solid var(--border-color); 
            background: #2a2a2a;
            color: white;
            width: 100%; 
            box-sizing: border-box; 
            font-size: 17px; 
            text-align: center;
        }
        select:focus, input:focus { border-color: var(--accent-color); outline: none; }

        /* 隊伍清單 */
        .team-card { 
            margin-bottom: 40px; 
            padding: 25px; 
            border: 1px solid var(--border-color); 
            border-radius: 15px; 
            background: rgba(255,255,255,0.02);
        }
        .team-title { 
            background: var(--accent-color); 
            color: white; 
            padding: 6px 30px; 
            border-radius: 50px; 
            margin-bottom: 25px; 
            display: inline-block;
            font-weight: bold;
        }

        .member-row { 
            display: grid; 
            grid-template-columns: 1fr 1.5fr; 
            gap: 20px; 
            margin-bottom: 15px; 
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        /* 建議框 */
        .suggestion-box { 
            background-color: rgba(255,255,255,0.03); 
            border: 2px dashed var(--border-color); 
            padding: 30px; 
            margin-top: 20px; 
            border-radius: 12px;
            line-height: 1.8;
            font-size: 1.1em;
        }
        .success-box {
            border-color: var(--success-color);
            background-color: rgba(46, 204, 113, 0.1);
            color: #afffcf;
        }

        /* 右下角標註 */
        .dev-credit {
            position: fixed;
            right: 20px;
            bottom: 20px;
            color: #555;
            font-size: 0.9em;
            letter-spacing: 1px;
            font-weight: bold;
        }

        @media (max-width: 650px) {
            .member-row { grid-template-columns: 1fr; }
            .setup-section { flex-direction: column; align-items: center; }
            .dev-credit { position: static; margin-top: 30px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🍁 Artale 組隊系統</h1>

    <div class="setup-section">
        <div class="setup-item">
            <label>1. 選擇首領</label>
            <select id="bossSelect" onchange="initTeams()">
                <option value="">-- 請選擇 --</option>
                <option value="殘暴炎魔">殘暴炎魔 (6人)</option>
                <option value="困難拉圖斯">困難拉圖斯 (6人)</option>
                <option value="闇黑龍王">闇黑龍王 (12人)</option>
            </select>
        </div>
        <div class="setup-item">
            <label>2. 隊伍組數</label>
            <select id="teamCountSelect" onchange="initTeams()">
                <option value="1">1 組</option>
                <option value="2">2 組</option>
                <option value="3">3 組</option>
                <option value="4">4 組</option>
                <option value="5">5 組</option>
            </select>
        </div>
        <div class="setup-item wide">
            <label>3. 開打日期時間</label>
            <input type="text" id="globalTime" placeholder="例如：10/25 20:00" oninput="calculateSuggestion()">
        </div>
    </div>

    <div id="teamContainer"></div>

    <div id="suggestion" class="suggestion-box" style="display:none;">
        <div id="suggestionText"></div>
    </div>
</div>

<div class="dev-credit">開發者：SUMMER公會</div>

<script>
    const jobs = [
        { name: "英雄", type: "physical", buff: "" }, 
        { name: "聖騎士", type: "physical", buff: "" }, 
        { name: "黑騎士", type: "physical", buff: " (火)" },
        { name: "神射手", type: "physical", buff: " (眼)" }, 
        { name: "箭神", type: "physical", buff: " (眼)" },
        { name: "鏢賊", type: "physical", buff: " (速)" }, 
        { name: "刀賊", type: "physical", buff: " (速)" },
        { name: "槍神", type: "physical", buff: "" }, 
        { name: "拳霸", type: "physical", buff: " (極速)" },
        { name: "火毒", type: "magic", buff: "" }, 
        { name: "冰雷", type: "magic", buff: "" }, 
        { name: "主教", type: "magic", buff: " (祈禱)" }
    ];

    function initTeams() {
        const boss = document.getElementById('bossSelect').value;
        const groupCount = parseInt(document.getElementById('teamCountSelect').value);
        const container = document.getElementById('teamContainer');
        const suggestion = document.getElementById('suggestion');
        
        container.innerHTML = "";
        suggestion.style.display = (boss) ? "block" : "none";
        if (!boss) return;

        let membersPerGroup = boss === '闇黑龍王' ? 12 : 6;

        for (let g = 1; g <= groupCount; g++) {
            let groupDiv = document.createElement('div');
            groupDiv.className = "team-card";
            groupDiv.innerHTML = `<div class="team-title">第 ${g} 團名單</div>`;
            
            for (let i = 1; i <= membersPerGroup; i++) {
                groupDiv.innerHTML += `
                    <div class="member-row">
                        <select class="job-select" onchange="calculateSuggestion()">
                            <option value="">選擇職業</option>
                            ${jobs.map(j => `<option value="${j.name}">${j.name}${j.buff}</option>`).join('')}
                        </select>
                        <input type="text" placeholder="成員名稱">
                    </div>
                `;
            }
            container.appendChild(groupDiv);
        }
        calculateSuggestion();
    }

    function calculateSuggestion() {
        const boss = document.getElementById('bossSelect').value;
        const groupCount = parseInt(document.getElementById('teamCountSelect').value);
        const globalTime = document.getElementById('globalTime').value || "未填寫";
        
        const selects = document.querySelectorAll('.job-select');
        const selectedJobNames = Array.from(selects).map(s => s.value).filter(v => v);
        
        const suggestionText = document.getElementById('suggestionText');
        const suggestionBox = document.getElementById('suggestion');

        const totalNeeded = (boss === '闇黑龍王' ? 12 : 6) * groupCount;

        // 計算目前職業屬性
        const hasHB = selectedJobNames.includes("黑騎士");
        const hasSE = selectedJobNames.some(j => ["神射手", "箭神"].includes(j));
        const hasHaste = selectedJobNames.some(j => ["鏢賊", "刀賊"].includes(j));
        const mageCount = selectedJobNames.filter(j => ["火毒", "冰雷", "主教"].includes(j)).length;

        suggestionBox.classList.remove('success-box');

        if (selectedJobNames.length >= totalNeeded) {
            suggestionBox.classList.add('success-box');
            suggestionText.innerHTML = `<strong>✨ 組隊完成！</strong><br>📅 開打日期：${globalTime}<br>💊 請成員備妥萬能藥、藥水與櫻桃派，準時抵達！`;
        } else {
            let advice = [];
            if (!hasHB) advice.push("黑騎士(火)");
            if (!hasSE) advice.push("弓箭手(眼)");
            if (!hasHaste) advice.push("盜賊(速)");
            
            // 法師建議邏輯
            if (boss === "殘暴炎魔" && mageCount < 1) advice.push("法師(至少1名)");
            if (boss === "困難拉圖斯" && mageCount < 2) advice.push("法師(至少2名)");

            let remaining = totalNeeded - selectedJobNames.length;
            let adviceStr = advice.length > 0 ? "建議優先尋找：" + advice.join("、") : "核心職業已齊全！";
            
            suggestionText.innerHTML = `💡 組隊進度：還差 ${remaining} 人<br>${adviceStr}`;
        }
    }
</script>

</body>
</html>
