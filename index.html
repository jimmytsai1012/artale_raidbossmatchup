<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Artale 組隊編排</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #3498db;
            --success-color: #2ecc71;
            --border-color: #333;
        }
        body { 
            font-family: "Microsoft JhengHei", sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            font-size: 18px;
        }
        .container { 
            width: 100%;
            max-width: 900px; 
            background: var(--card-bg); 
            padding: 40px; 
            border-radius: 16px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.6); 
            text-align: center;
        }
        h1 { color: var(--accent-color); font-size: 2.8em; margin-bottom: 20px; letter-spacing: 2px; }
        
        .setup-section { 
            display: flex; 
            justify-content: center;
            gap: 25px; 
            margin-bottom: 40px; 
            padding: 25px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }
        .setup-item { width: 250px; }

        label { font-weight: bold; margin-bottom: 12px; display: block; color: var(--accent-color); }
        select, input { 
            padding: 12px; 
            border-radius: 8px; 
            border: 1px solid var(--border-color); 
            background: #2a2a2a;
            color: white;
            width: 100%; 
            box-sizing: border-box; 
            font-size: 17px; 
            text-align: center;
        }

        .team-group-card { 
            margin-bottom: 50px; 
            padding: 30px; 
            border: 2px solid var(--border-color); 
            border-radius: 20px; 
            background: rgba(255,255,255,0.01);
        }
        .group-header { margin-bottom: 25px; }
        .group-title { font-size: 1.8em; color: var(--accent-color); font-weight: bold; display: block; margin-bottom: 10px; }
        
        .sub-team-container { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .sub-team { 
            flex: 1; 
            min-width: 380px; 
            background: #252525; 
            padding: 20px; 
            border-radius: 12px; 
            border: 1px solid #333;
        }
        .sub-team-title { background: #444; color: #ddd; padding: 4px 15px; border-radius: 4px; font-size: 0.9em; margin-bottom: 15px; display: inline-block; }

        .member-row { 
            display: grid; 
            grid-template-columns: 1fr 1.2fr; 
            gap: 10px; 
            margin-bottom: 10px; 
        }

        .suggestion-box { 
            background-color: rgba(255,255,255,0.03); 
            border: 2px dashed var(--border-color); 
            padding: 20px; 
            margin-top: 20px; 
            border-radius: 12px;
            font-size: 1.05em;
        }
        .success-box {
            border-color: var(--success-color);
            background-color: rgba(46, 204, 113, 0.1);
            color: #afffcf;
        }

        .clear-btn {
            background: #c0392b;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            font-size: 0.8em;
        }

        .dev-credit {
            position: fixed;
            right: 20px;
            bottom: 20px;
            color: #444;
            font-size: 0.9em;
            font-weight: bold;
        }

        @media (max-width: 850px) {
            .sub-team { min-width: 100%; }
        }
    </style>
</head>
<body onload="loadData()">

<div class="container">
    <h1>🍁 Artale 組隊系統</h1>

    <div class="setup-section">
        <div class="setup-item">
            <label>選擇首領</label>
            <select id="bossSelect" onchange="initTeams(); saveData();">
                <option value="">-- 請選擇 --</option>
                <option value="殘暴炎魔">殘暴炎魔 (6人)</option>
                <option value="困難拉圖斯">困難拉圖斯 (6人)</option>
                <option value="闇黑龍王">闇黑龍王 (12人)</option>
            </select>
        </div>
        <div class="setup-item">
            <label>總共要開幾團？</label>
            <select id="teamCountSelect" onchange="initTeams(); saveData();">
                <option value="1">1 團</option>
                <option value="2">2 團</option>
                <option value="3">3 團</option>
                <option value="4">4 團</option>
                <option value="5">5 團</option>
            </select>
        </div>
    </div>

    <div id="mainContainer"></div>
    
    <button class="clear-btn" onclick="clearAllData()">🗑️ 清空所有存檔</button>
</div>

<div class="dev-credit">開發者：SUMMER公會</div>

<script>
    const jobs = [
        { name: "英雄", buff: "" }, { name: "聖騎士", buff: "" }, { name: "黑騎士", buff: " (火)" },
        { name: "弓", buff: " (眼)" }, { name: "弩", buff: " (眼)" },
        { name: "鏢賊", buff: " (速)" }, { name: "刀賊", buff: " (速)" },
        { name: "槍神", buff: "" }, { name: "拳霸", buff: " (極速)" },
        { name: "火毒", buff: "" }, { name: "冰雷", buff: "" }, { name: "主教", buff: " (祈禱)" }
    ];

    function initTeams() {
        const boss = document.getElementById('bossSelect').value;
        const groupCount = parseInt(document.getElementById('teamCountSelect').value);
        const container = document.getElementById('mainContainer');
        container.innerHTML = "";
        if (!boss) return;

        for (let g = 1; g <= groupCount; g++) {
            let groupDiv = document.createElement('div');
            groupDiv.className = "team-group-card";
            groupDiv.id = `group-${g}`;
            
            let groupHeader = `
                <div class="group-header">
                    <span class="group-title">第 ${g} 團 (${boss})</span>
                    <div style="max-width:300px; margin: 0 auto;">
                        <label style="font-size:0.8em;">本團預計開打時間</label>
                        <input type="text" class="group-time" placeholder="例如：20:00" oninput="calculateSpecificGroup(${g}); saveData();">
                    </div>
                </div>
            `;
            
            let subTeamsHtml = '<div class="sub-team-container">';
            if (boss === '闇黑龍王') {
                subTeamsHtml += renderSubTeam(g, 1, 6) + renderSubTeam(g, 2, 6);
            } else {
                subTeamsHtml += renderSubTeam(g, 1, 6);
            }
            subTeamsHtml += '</div>';

            groupDiv.innerHTML = groupHeader + subTeamsHtml + `
                <div id="suggestion-${g}" class="suggestion-box">
                    <div id="suggestionText-${g}">請開始選擇職業...</div>
                </div>
            `;
            container.appendChild(groupDiv);
            calculateSpecificGroup(g);
        }
    }

    function renderSubTeam(groupIndex, teamIndex, count) {
        let rows = "";
        for (let i = 1; i <= count; i++) {
            rows += `
                <div class="member-row">
                    <select class="job-select-${groupIndex}" onchange="calculateSpecificGroup(${groupIndex}); saveData();">
                        <option value="">職業</option>
                        ${jobs.map(j => `<option value="${j.name}">${j.name}${j.buff}</option>`).join('')}
                    </select>
                    <input type="text" class="name-input-${groupIndex}" placeholder="名稱" oninput="saveData()">
                </div>`;
        }
        return `<div class="sub-team"><span class="sub-team-title">隊伍 ${teamIndex}</span>${rows}</div>`;
    }

    function calculateSpecificGroup(g) {
        const boss = document.getElementById('bossSelect').value;
        const timeInput = document.querySelector(`#group-${g} .group-time`);
        const time = timeInput ? timeInput.value : "未填寫";
        const selects = document.querySelectorAll(`.job-select-${g}`);
        const selectedJobs = Array.from(selects).map(s => s.value).filter(v => v);
        
        const suggestionText = document.getElementById(`suggestionText-${g}`);
        const suggestionBox = document.getElementById(`suggestion-${g}`);
        if(!suggestionBox) return;

        const totalNeeded = (boss === '闇黑龍王' ? 12 : 6);
        
        const hasHB = selectedJobs.includes("黑騎士");
        const hasSE = selectedJobs.some(j => ["弓", "弩"].includes(j));
        const hasHaste = selectedJobs.some(j => ["鏢賊", "刀賊"].includes(j));
        const mageCount = selectedJobs.filter(j => ["火毒", "冰雷", "主教"].includes(j)).length;

        suggestionBox.classList.remove('success-box');

        if (selectedJobs.length >= totalNeeded) {
            suggestionBox.classList.add('success-box');
            suggestionText.innerHTML = `<strong> 第 ${g} 團 組隊完成！</strong><br>開打時間：${time}<br>藥水與櫻桃派請準備好！`;
        } else {
            let advice = [];
            if (!hasHB) advice.push("黑騎士(火)");
            if (!hasSE) advice.push("弓箭手(眼)");
            if (!hasHaste) advice.push("盜賊(速)");
            if (boss === "殘暴炎魔" && mageCount < 1) advice.push("法師(1)");
            if (boss === "困難拉圖斯" && mageCount < 2) advice.push("法師(2)");

            let remaining = totalNeeded - selectedJobs.length;
            let adviceStr = advice.length > 0 ? "建議補： " + advice.join("、") : "核心職業 OK";
            suggestionText.innerHTML = `💡 第 ${g} 團還差 ${remaining} 人<br>${adviceStr}`;
        }
    }

    // --- 暫存功能區 ---
    
    function saveData() {
        const data = {
            boss: document.getElementById('bossSelect').value,
            teamCount: document.getElementById('teamCountSelect').value,
            groups: []
        };

        const groupCards = document.querySelectorAll('.team-group-card');
        groupCards.forEach((card, index) => {
            const gIdx = index + 1;
            const groupData = {
                time: card.querySelector('.group-time').value,
                jobs: Array.from(document.querySelectorAll(`.job-select-${gIdx}`)).map(s => s.value),
                names: Array.from(document.querySelectorAll(`.name-input-${gIdx}`)).map(i => i.value)
            };
            data.groups.push(groupData);
        });

        localStorage.setItem('artale_raid_data', JSON.stringify(data));
    }

    function loadData() {
        const saved = localStorage.getItem('artale_raid_data');
        if (!saved) return;

        const data = JSON.parse(saved);
        document.getElementById('bossSelect').value = data.boss;
        document.getElementById('teamCountSelect').value = data.teamCount;

        // 重建 HTML 結構
        initTeams();

        // 填回詳細資料
        data.groups.forEach((groupData, gIdx) => {
            const gNum = gIdx + 1;
            const timeInput = document.querySelector(`#group-${gNum} .group-time`);
            if (timeInput) timeInput.value = groupData.time;

            const selects = document.querySelectorAll(`.job-select-${gNum}`);
            const names = document.querySelectorAll(`.name-input-${gNum}`);

            groupData.jobs.forEach((job, jIdx) => {
                if (selects[jIdx]) selects[jIdx].value = job;
            });
            groupData.names.forEach((name, nIdx) => {
                if (names[nIdx]) names[nIdx].value = name;
            });
            calculateSpecificGroup(gNum);
        });
    }

    function clearAllData() {
        if (confirm("確定要清空所有已填寫的名單嗎？")) {
            localStorage.removeItem('artale_raid_data');
            location.reload();
        }
    }
</script>

</body>
</html>
