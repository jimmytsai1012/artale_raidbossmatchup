<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>楓之谷 Artale 組隊系統</title>
    <style>
        :root {
            --primary-color: #2980b9;
            --bg-color: #f0f2f5;
        }
        body { 
            font-family: "Microsoft JhengHei", "PingFang TC", sans-serif; 
            background-color: var(--bg-color); 
            padding: 30px; 
            color: #333; 
            font-size: 18px; /* 全體字體加大 */
        }
        .container { 
            max-width: 1000px; 
            margin: 0 auto; 
            background: #fff; 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
        }
        h1 { text-align: center; color: #2c3e50; font-size: 2.2em; margin-bottom: 30px; }
        
        .setup-section { 
            display: flex; 
            gap: 20px; 
            margin-bottom: 30px; 
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        .setup-item { flex: 1; }

        label { font-weight: bold; margin-bottom: 10px; display: block; color: #555; }
        select, input { 
            padding: 12px; 
            border-radius: 6px; 
            border: 2px solid #ddd; 
            width: 100%; 
            box-sizing: border-box; 
            font-size: 17px; 
        }
        select:focus, input:focus { border-color: var(--primary-color); outline: none; }

        .team-card { 
            margin-bottom: 30px; 
            padding: 20px; 
            border: 2px solid #eef2f7; 
            border-radius: 12px; 
            background: #fff;
        }
        .team-title { 
            background: var(--primary-color); 
            color: white; 
            padding: 10px 20px; 
            border-radius: 6px; 
            margin-bottom: 15px; 
            font-weight: bold;
            display: inline-block;
        }

        .member-row { 
            display: grid; 
            grid-template-columns: 1.5fr 1.5fr 1.2fr; 
            gap: 15px; 
            margin-bottom: 12px; 
            align-items: center; 
        }

        .suggestion-box { 
            background-color: #fff9db; 
            border-left: 8px solid #f1c40f; 
            padding: 20px; 
            margin-top: 30px; 
            font-size: 1.1em;
            line-height: 1.6;
            border-radius: 8px;
        }
        .success-box {
            background-color: #d4edda;
            border-left: 8px solid #28a745;
            color: #155724;
        }

        @media (max-width: 600px) {
            .member-row { grid-template-columns: 1fr; }
            .setup-section { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1> Artale 打王組隊系統</h1>

    <div class="setup-section">
        <div class="setup-item">
            <label>1. 選擇首領</label>
            <select id="bossSelect" onchange="initTeams()">
                <option value="">-- 請選擇 --</option>
                <option value="zakum">殘暴炎魔 (6人)</option>
                <option value="papulatus">困難拉圖斯 (6人)</option>
                <option value="horntail">闇黑龍王 (12人)</option>
            </select>
        </div>
        <div class="setup-item">
            <label>2. 隊伍組數</label>
            <select id="teamCountSelect" onchange="initTeams()">
                <option value="1">1 組</option>
                <option value="2">2 組</option>
                <option value="3">3 組</option>
                <option value="4">4 組</option>
                <option value="5">5 組</option>
            </select>
        </div>
    </div>

    <div id="teamContainer"></div>

    <div id="suggestion" class="suggestion-box" style="display:none;">
        <div id="suggestionText"></div>
    </div>
</div>

<script>
    const jobs = [
        { name: "英雄", type: "physical", buff: "" },
        { name: "聖騎士", type: "physical", buff: "" },
        { name: "黑騎士", type: "physical", buff: " (火)" },
        { name: "弓", type: "physical", buff: " (眼)" },
        { name: "弩", type: "physical", buff: " (眼)" },
        { name: "鏢賊", type: "physical", buff: " (速)" },
        { name: "刀賊", type: "physical", buff: " (速)" },
        { name: "槍神", type: "physical", buff: "" },
        { name: "拳霸", type: "physical", buff: " (極速)" },
        { name: "火毒", type: "magic", buff: "" },
        { name: "冰雷", type: "magic", buff: "" },
        { name: "主教", type: "magic", buff: " (祈禱)" }
    ];

    function initTeams() {
        const boss = document.getElementById('bossSelect').value;
        const groupCount = parseInt(document.getElementById('teamCountSelect').value);
        const container = document.getElementById('teamContainer');
        const suggestion = document.getElementById('suggestion');
        
        container.innerHTML = "";
        suggestion.style.display = "none";

        if (!boss) return;

        // 每個「組」的人數
        let membersPerGroup = boss === 'horntail' ? 12 : 6;

        for (let g = 1; g <= groupCount; g++) {
            let groupDiv = document.createElement('div');
            groupDiv.className = "team-card";
            groupDiv.innerHTML = `<div class="team-title">第 ${g} 團 - ${boss === 'horntail' ? '12人模式' : '6人模式'}</div>`;
            
            for (let i = 1; i <= membersPerGroup; i++) {
                groupDiv.innerHTML += `
                    <div class="member-row">
                        <select class="job-select" onchange="calculateSuggestion()">
                            <option value="">-- 選擇職業 --</option>
                            ${jobs.map(j => `<option value="${j.name}">${j.name}${j.buff}</option>`).join('')}
                        </select>
                        <input type="text" placeholder="成員名稱">
                        <input type="text" class="date-input" placeholder="開打日期 (如: 10/20 20:00)" oninput="calculateSuggestion()">
                    </div>
                `;
            }
            container.appendChild(groupDiv);
        }
        calculateSuggestion();
    }

    function calculateSuggestion() {
        const boss = document.getElementById('bossSelect').value;
        const selects = document.querySelectorAll('.job-select');
        const dateInputs = document.querySelectorAll('.date-input');
        const suggestion = document.getElementById('suggestion');
        const suggestionText = document.getElementById('suggestionText');
        
        let selectedJobs = [];
        let dates = [];
        selects.forEach(s => { if(s.value) selectedJobs.push(s.value); });
        dateInputs.forEach(d => { if(d.value) dates.push(d.value); });

        if (selectedJobs.length === 0) {
            suggestion.style.display = "none";
            return;
        }

        suggestion.style.display = "block";
        suggestion.classList.remove('success-box');

        const groupCount = parseInt(document.getElementById('teamCountSelect').value);
        const totalNeeded = (boss === 'horntail' ? 12 : 6) * groupCount;

        // 檢查是否組滿
        if (selectedJobs.length >= totalNeeded) {
            suggestion.classList.add('success-box');
            let displayDate = dates[0] || "尚未填寫";
            suggestionText.innerHTML = `<strong> 組隊完成！</strong><br>開打日期：${displayDate}<br>請各位成員備妥<strong>萬能藥、藥水和櫻桃派</strong>，盡量準時抵達。`;
            return;
        }

        // 建議邏輯 (以第一團為主要偵測)
        let advice = ["目前建議尋找："];
        const hasHB = selectedJobs.includes("火");
        const hasSE = selectedJobs.some(j => ["眼"].includes(j));
        const hasHaste = selectedJobs.some(j => ["速"].includes(j));
        const hasSI = selectedJobs.includes("拳霸");
        const mageCount = selectedJobs.filter(j => ["法師"].includes(j)).length;

        if (!hasHB) advice.push("黑騎士(火)");
        if (!hasSE) advice.push("弓箭手(眼)");
        if (!hasHaste) advice.push("盜賊(速)");

        if (boss === 'zakum' && mageCount < 1) advice.push("至少 1 名法師");
        if (boss === 'papulatus' && mageCount < 2) advice.push("至少 2 名法師");
        
        if (boss === 'horntail' && hasSI) {
            advice.push("以及能配合極速的職業(劍士/弩/刀賊)");
        }

        let remaining = totalNeeded - selectedJobs.length;
        advice.push(`還差 ${remaining} 名成員`);

        suggestionText.innerHTML = advice.join(" ");
    }
</script>

</body>
</html>
