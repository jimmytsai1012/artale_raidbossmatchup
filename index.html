<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title> Artale 組隊系統 </title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #3498db;
            --success-color: #2ecc71;
            --border-color: #333;
        }
        body { 
            font-family: "Microsoft JhengHei", sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            font-size: 18px;
        }
        .container { 
            width: 100%;
            max-width: 850px; 
            background: var(--card-bg); 
            padding: 40px; 
            border-radius: 16px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.6); 
            text-align: center;
        }
        h1 { color: var(--accent-color); font-size: 2.8em; margin-bottom: 30px; letter-spacing: 2px; }
        
        .setup-section { 
            display: inline-flex; 
            justify-content: center;
            gap: 25px; 
            margin-bottom: 40px; 
            padding: 25px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }
        .setup-item { width: 280px; }

        label { font-weight: bold; margin-bottom: 12px; display: block; color: var(--accent-color); }
        select, input { 
            padding: 12px; 
            border-radius: 8px; 
            border: 1px solid var(--border-color); 
            background: #2a2a2a;
            color: white;
            width: 100%; 
            box-sizing: border-box; 
            font-size: 17px; 
            text-align: center;
            transition: border 0.3s;
        }
        select:focus, input:focus { border-color: var(--accent-color); outline: none; }

        .team-card { 
            margin-bottom: 45px; 
            padding: 25px; 
            border: 1px solid var(--border-color); 
            border-radius: 15px; 
            background: rgba(255,255,255,0.02);
        }
        .team-title { 
            background: var(--accent-color); 
            color: white; 
            padding: 6px 30px; 
            border-radius: 50px; 
            margin-bottom: 25px; 
            display: inline-block;
            font-weight: bold;
            font-size: 1.1em;
        }

        .member-row { 
            display: grid; 
            grid-template-columns: 1fr 1fr 1fr; 
            gap: 15px; 
            margin-bottom: 15px; 
        }

        .suggestion-box { 
            background-color: rgba(255,255,255,0.03); 
            border: 2px dashed var(--border-color); 
            padding: 30px; 
            margin-top: 20px; 
            border-radius: 12px;
            line-height: 1.8;
            font-size: 1.1em;
        }
        .success-box {
            border-color: var(--success-color);
            background-color: rgba(46, 204, 113, 0.1);
            color: #afffcf;
        }

        /* 右下角開發者標註 */
        .dev-credit {
            position: fixed;
            right: 20px;
            bottom: 20px;
            color: #555;
            font-size: 0.9em;
            letter-spacing: 1px;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        @media (max-width: 650px) {
            .member-row { grid-template-columns: 1fr; }
            .setup-section { flex-direction: column; align-items: center; }
            .dev-credit { position: static; margin-top: 30px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1> Artale 組隊系統</h1>

    <div class="setup-section">
        <div class="setup-item">
            <label>1. 選擇首領</label>
            <select id="bossSelect" onchange="initTeams()">
                <option value="">-- 請選擇 --</option>
                <option value="殘暴炎魔">殘暴炎魔</option>
                <option value="困難拉圖斯">困難拉圖斯</option>
                <option value="闇黑龍王">闇黑龍王</option>
            </select>
        </div>
        <div class="setup-item">
            <label>2. 隊伍組數</label>
            <select id="teamCountSelect" onchange="initTeams()">
                <option value="1">1 組</option>
                <option value="2">2 組</option>
                <option value="3">3 組</option>
                <option value="4">4 組</option>
                <option value="5">5 組</option>
            </select>
        </div>
    </div>

    <div id="teamContainer"></div>

    <div id="suggestion" class="suggestion-box" style="display:none;">
        <div id="suggestionText"></div>
    </div>
</div>

<div class="dev-credit">開發者：SUMMER公會</div>

<script>
    const jobs = [
        { name: "英雄", buff: "" }, { name: "聖騎士", buff: "" }, { name: "黑騎士", buff: " (火)" },
        { name: "神射手", buff: " (眼)" }, { name: "箭神", buff: " (眼)" },
        { name: "鏢賊", buff: " (速)" }, { name: "刀賊", buff: " (速)" },
        { name: "槍神", buff: "" }, { name: "拳霸", buff: " (極速)" },
        { name: "火毒", buff: "" }, { name: "冰雷", buff: "" }, { name: "主教", buff: " (祈禱)" }
    ];

    function initTeams() {
        const boss = document.getElementById('bossSelect').value;
        const groupCount = parseInt(document.getElementById('teamCountSelect').value);
        const container = document.getElementById('teamContainer');
        const suggestion = document.getElementById('suggestion');
        
        container.innerHTML = "";
        suggestion.style.display = (boss) ? "block" : "none";
        if (!boss) return;

        let membersPerGroup = boss === '闇黑龍王' ? 12 : 6;

        for (let g = 1; g <= groupCount; g++) {
            let groupDiv = document.createElement('div');
            groupDiv.className = "team-card";
            groupDiv.innerHTML = `<div class="team-title">第 ${g} 團名單</div>`;
            
            for (let i = 1; i <= membersPerGroup; i++) {
                groupDiv.innerHTML += `
                    <div class="member-row">
                        <select class="job-select" onchange="calculateSuggestion()">
                            <option value="">職業</option>
                            ${jobs.map(j => `<option value="${j.name}">${j.name}${j.buff}</option>`).join('')}
                        </select>
                        <input type="text" placeholder="玩家名稱">
                        <input type="text" class="date-input" placeholder="日期時間" oninput="calculateSuggestion()">
                    </div>
                `;
            }
            container.appendChild(groupDiv);
        }
        calculateSuggestion();
    }

    function calculateSuggestion() {
        const boss = document.getElementById('bossSelect').value;
        const selects = document.querySelectorAll('.job-select');
        const selectedJobs = Array.from(selects).map(s => s.value).filter(v => v);
        const dateInputs = document.querySelectorAll('.date-input');
        const suggestionText = document.getElementById('suggestionText');
        const suggestionBox = document.getElementById('suggestion');

        const groupCount = parseInt(document.getElementById('teamCountSelect').value);
        const totalNeeded = (boss === '闇黑龍王' ? 12 : 6) * groupCount;

        suggestionBox.classList.remove('success-box');

        if (selectedJobs.length >= totalNeeded) {
            suggestionBox.classList.add('success-box');
            let firstDate = "";
            for(let d of dateInputs) { if(d.value) { firstDate = d.value; break; } }
            suggestionText.innerHTML = `<strong>✨ 組隊完成！</strong><br>📅 開打日期：${firstDate || "未填寫"}<br> 請成員備妥萬能藥、藥水與櫻桃派，準時抵達！`;
        } else {
            let advice = `還差 ${totalNeeded - selectedJobs.length} 人。`;
            if (!selectedJobs.includes("黑騎士")) advice += " (缺火)";
            if (!selectedJobs.some(j => ["神射手", "箭神"].includes(j))) advice += " (缺眼)";
            if (!selectedJobs.some(j => ["鏢賊", "刀賊"].includes(j))) advice += " (缺速)";
            suggestionText.innerHTML = `💡 組隊建議：${advice}`;
        }
    }
</script>

</body>
</html>
